<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Expense Tracker (SET) — Tests</title>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0A0F1E; color: #F0F4FF; padding: 2rem; }
    h1 { margin-bottom: 1rem; }
    .pass { color: #10B981; }
    .fail { color: #EF4444; }
    pre { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; line-height: 1.8; }
    .summary { margin-top: 1rem; font-weight: 600; font-size: 1.1rem; }
  </style>
</head>
<body>
  <h1>SET — Test Suite</h1>
  <pre id="output"></pre>
  <script type="module">
    import { validate, hasDuplicateWord, compileRegex } from './scripts/validators.js';
    import { validateImport } from './scripts/storage.js';

    const out = document.getElementById('output');
    let passed = 0;
    let failed = 0;

    function assert(label, condition) {
      if (condition) {
        passed++;
        out.innerHTML += `<span class="pass">✓ ${label}</span>\n`;
      } else {
        failed++;
        out.innerHTML += `<span class="fail">✗ ${label}</span>\n`;
      }
    }

    // 1–3: Description validation
    assert('validate description "Lunch" → null',
      validate('description', 'Lunch') === null);
    assert('validate description " Lunch" (leading space) → error',
      validate('description', ' Lunch') !== null);
    assert('validate description "Lunch " (trailing space) → error',
      validate('description', 'Lunch ') !== null);

    // 4–6: Amount validation
    assert('validate amount "12.50" → null',
      validate('amount', '12.50') === null);
    assert('validate amount "12.5.0" → error',
      validate('amount', '12.5.0') !== null);
    assert('validate amount "0" → null',
      validate('amount', '0') === null);

    // 7–8: Date validation
    assert('validate date "2025-09-25" → null',
      validate('date', '2025-09-25') === null);
    assert('validate date "2025-13-01" → error',
      validate('date', '2025-13-01') !== null);

    // 9–10: Category validation
    assert('validate category "Food" → null',
      validate('category', 'Food') === null);
    assert('validate category "123food" → error',
      validate('category', '123food') !== null);

    // 11–12: Duplicate word detection
    assert('hasDuplicateWord "the the test" → true',
      hasDuplicateWord('the the test') === true);
    assert('hasDuplicateWord "the quick brown fox" → false',
      hasDuplicateWord('the quick brown fox') === false);

    // 13–14: compileRegex
    assert('compileRegex "coffee|tea" → RegExp',
      compileRegex('coffee|tea') instanceof RegExp);
    assert('compileRegex "[invalid" → null',
      compileRegex('[invalid') === null);

    // 15–16: validateImport
    const validData = [
      {"id":"txn_0001","description":"Lunch","amount":12.50,"category":"Food","date":"2025-09-25","createdAt":"2025-09-25T12:00:00.000Z","updatedAt":"2025-09-25T12:00:00.000Z"}
    ];
    assert('validateImport valid array → true',
      validateImport(validData) === true);
    assert('validateImport "not an array" → false',
      validateImport("not an array") === false);

    // 17–19: Search & highlight
    import { filterByRegex, highlight } from './scripts/search.js';

    const testRecords = [
      {id:'t1', description:'Coffee with friends', category:'Food', amount:8.75, date:'2025-09-28'},
      {id:'t2', description:'Bus pass', category:'Transport', amount:45, date:'2025-09-20'}
    ];

    assert('filterByRegex /coffee/i → returns matching record',
      filterByRegex(testRecords, /coffee/i).length === 1);
    assert('highlight "Coffee with friends" /coffee/i → contains <mark>',
      highlight('Coffee with friends', /coffee/i).includes('<mark>Coffee</mark>'));
    assert('highlight "<script>" null → escapes HTML',
      highlight('<script>', null) === '&lt;script&gt;');

    // 20–21: validateImport edge cases
    assert('validateImport [] (empty array) → true',
      validateImport([]) === true);
    assert('validateImport [{id:"x"}] (missing fields) → false',
      validateImport([{id:'x'}]) === false);

    // 22–23: Sort order
    import { sortRecords } from './scripts/ui.js';

    const sortedAsc = sortRecords(testRecords, 'amount', 'asc');
    assert('sort by amount asc → lowest first',
      sortedAsc[0].amount <= sortedAsc[1].amount);

    const sortedDateDesc = sortRecords(testRecords, 'date', 'desc');
    assert('sort by date desc → most recent first',
      sortedDateDesc[0].date >= sortedDateDesc[1].date);

    // 24: Timeline filter
    import { filterByTimeline } from './scripts/ui.js';

    const timelineRecords = [
      {id:'t1', description:'Today', category:'Food', amount:10, date: new Date().toISOString().slice(0,10)},
      {id:'t2', description:'Old', category:'Food', amount:20, date:'2020-01-01'}
    ];
    assert('filterByTimeline "7" → only recent records',
      filterByTimeline(timelineRecords, '7').length === 1);

    // 25: Budget sum
    const testBudgets = { Food: 150, Books: 100, Transport: 80 };
    const budgetSum = Object.values(testBudgets).reduce((s, v) => s + v, 0);
    assert('sum of category budgets equals expected total',
      budgetSum === 330);

    // 26: Duplicate word with repeated word
    assert('hasDuplicateWord "going going gone" → true',
      hasDuplicateWord('going going gone') === true);

    // 27: compileRegex with lookbehind
    assert('compileRegex "(?<=\\s)\\d+" → RegExp or null (no throw)',
      (() => { try { compileRegex('(?<=\\s)\\d+', 'i'); return true; } catch { return false; } })());

    // 28–29: Formatting
    import { formatAmount, formatRate } from './scripts/validators.js';

    assert('formatAmount "100" → "100.00"',
      formatAmount('100') === '100.00');
    assert('formatAmount "5.0555" → "5.06"',
      formatAmount('5.0555') === '5.06');

    // Summary
    const total = passed + failed;
    const cls = failed === 0 ? 'pass' : 'fail';
    out.innerHTML += `\n<span class="summary ${cls}">${passed}/${total} tests passed</span>\n`;
  </script>
</body>
</html>
